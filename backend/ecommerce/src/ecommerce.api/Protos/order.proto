syntax = "proto3";

option csharp_namespace = "ecommerce.api.grpc";

package order;



service OrderServiceGrpc {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}


message CreateOrderRequest {
  int32 UserId = 1;
  string  UserName = 2;
  string  UserEmail = 3;
  int32  ProductId = 4;
  string  ProductName = 5;
  string  ProductDescription = 6;
  int32 ProductQuantity = 7;
  float  Price = 8;
}


message CreateOrderResponse {
  int32 OrderId = 1;
  int32 UserId = 2;
  string  UserName = 3;
  int32  ProductId = 4;
  string  ProductName = 5;
  string  ProductDescription = 6;
  int32 ProductQuantity = 7;
  float  Price = 8;
  string DeliverDate = 9;
  bool IsVerified = 10;

}

